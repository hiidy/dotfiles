# ~/dotfiles/tmux/tmux.conf

# --- 터미널 및 컬러 설정 ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10

# Undercurl (Neovim LSP 진단용)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# --- 기본 설정 ---
set -g mouse on
set -g allow-passthrough on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
set-option -g renumber-windows on

# --- dotbar 테마 (Kanagawa 색상) ---
set -g @tmux-dotbar-bg "#1f1f28"
set -g @tmux-dotbar-fg "#54546d"
set -g @tmux-dotbar-fg-current "#dcd7ba"
set -g @tmux-dotbar-fg-session "#727169"
set -g @tmux-dotbar-fg-prefix "#957fb8"
set -g @tmux-dotbar-bold-current-window true
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-window-status-separator " · "

# --- 플러그인 리스트 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Resurrect 설정
set -g @resurrect-strategy-nvim 'session'

# --- TPM 초기화 (반드시 맨 아래) ---
run '~/.tmux/plugins/tpm/tpm'