# ~/dotfiles/tmux/tmux.conf

# --- 터미널 및 컬러 설정 ---
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',xterm-kitty:RGB:clipboard'
set -sg escape-time 0
set -s extended-keys on

# --- 기본 설정 ---
set -g mouse on
set -g allow-passthrough on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g focus-events on
set -s set-clipboard on
setw -g aggressive-resize on
set-option -g renumber-windows on
set -g window-size latest
set -g detach-on-destroy off
set -g display-time 1500
set -g mode-keys vi

# --- 키바인딩 ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Pane 분할 (현재 경로 유지)
bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vi copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Kanagawa 테마 (pane, mode, message) ---
set -g mode-style "fg=#7e9cd8,bg=#363646"
set -g message-style "fg=#dcd7ba,bg=#2a2a37"
set -g message-command-style "fg=#dcd7ba,bg=#2a2a37"
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#957fb8"
set -g pane-border-indicators colour
set -g pane-border-lines heavy

# --- dotbar 테마 (Kanagawa 색상) ---
set -g @tmux-dotbar-bg "#1f1f28"
set -g @tmux-dotbar-fg "#54546d"
set -g @tmux-dotbar-fg-current "#dcd7ba"
set -g @tmux-dotbar-fg-session "#727169"
set -g @tmux-dotbar-fg-prefix "#957fb8"
set -g @tmux-dotbar-bold-current-window true
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-window-status-separator " · "

# --- 플러그인 리스트 ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'vaaleyard/tmux-dotbar'

# Resurrect 설정
set -g @resurrect-strategy-nvim 'session'

# Continuum 설정
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# --- TPM 초기화 (반드시 맨 아래) ---
run '~/.config/tmux/plugins/tpm/tpm'
